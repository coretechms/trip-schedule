    .h14 td { height: 14px; }
    .h16 td { height: 16px; }
    .h18 td { height: 18px; }
    .h20 td { height: 20px; }
    .h22 td { height: 22px; }
    .h26 td { height: 26px; }
    .h30 td { height: 30px; }
    .h38 td { height: 38px; }
    .h50 td { height: 50px; }
    .h58 td { height: 58px; }
    .h62 td { height: 62px; }
    .spaced { letter-spacing: 0.15em; }
    .expected-top td:not(:first-child) { border-bottom: 0; }
    .expected-bottom td { border-top: 0; }
    .sky-cell { background: #eaf6ff !important; }
    .sky-cell .cell-input { background: #eaf6ff !important; }
    .readonly-cell .cell-input {

      pointer-events: none;

  <script>
    function parseDuration(text) {
      const raw = String(text || '').replace(/예정/g, '').trim();
      const match = raw.match(/(\d{1,2})\s*:\s*(\d{2})/);
      if (!match) return 0;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function parseTime(text) {
      const raw = String(text || '').trim();
      const match = raw.match(/(\d{1,2})\s*:\s*(\d{2})/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function formatTime(totalMinutes) {
      const minutesInDay = 24 * 60;
      let value = totalMinutes % minutesInDay;
      if (value < 0) value += minutesInDay;
      const h = Math.floor(value / 60);
      const m = value % 60;
      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function parseNumber(text) {
      const raw = String(text || '').replace(/[^\d.-]/g, '');
      const value = Number(raw);
      return Number.isFinite(value) ? value : 0;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function updateGimbapTotals() {
      const totalPeopleEl = document.getElementById('total-people');
      const extraPeopleEl = document.getElementById('extra-people');
      const unitPriceEl = document.getElementById('gimbap-price');
      const countEl = document.getElementById('gimbap-count');
      const totalEl = document.getElementById('gimbap-total');
      const mealCountEl = document.getElementById('meal-count');
      if (!totalPeopleEl || !extraPeopleEl || !unitPriceEl || !countEl || !totalEl) return;

      const totalPeople = parseNumber(totalPeopleEl.value);
      const extraPeople = parseNumber(extraPeopleEl.value);
      const unitPrice = parseNumber(unitPriceEl.value);
      const mealCount = totalPeople + extraPeople;
      const orderCount = totalPeople + extraPeople;
      const totalPrice = orderCount * unitPrice;

      if (mealCountEl) mealCountEl.value = formatNumber(mealCount) + ' 명';
      countEl.value = formatNumber(orderCount) + ' 줄';
      totalEl.value = formatNumber(totalPrice) + ' 원';
    }

    function updateExpectedTimes() {
      const baseEl = document.getElementById('base-time');
      if (!baseEl) return;
      const base = parseTime(baseEl.value);
      if (base === null) return;

      const d1 = parseDuration(document.getElementById('duration-start').value);
      const d2 = parseDuration(document.getElementById('duration-hike').value);
      const d3 = parseDuration(document.getElementById('duration-move').value);
      const d4 = parseDuration(document.getElementById('duration-stop1').value);
      const d5 = parseDuration(document.getElementById('duration-meal').value);
      const d6 = parseDuration(document.getElementById('duration-skywalk').value);
      const d7 = parseDuration(document.getElementById('duration-home').value);

      const t1 = base + d1;
      const t2 = t1 + d2;
      const t3 = t2 + d3;
      const t4 = t3 + d4;
      const t5 = t4 + d5;
      const t6 = t5 + d6;
      const t7 = t6 + d7;

      document.getElementById('calc-top-1').value = formatTime(t1) + ' ->';
      document.getElementById('calc-top-2').value = formatTime(t2) + ' ->';
      document.getElementById('calc-top-3').value = formatTime(t3) + ' ->';
      document.getElementById('calc-top-4').value = formatTime(t4) + ' ->';
      document.getElementById('calc-top-5').value = formatTime(t5) + ' ->';
      document.getElementById('calc-top-6').value = formatTime(t6) + ' ->';

      document.getElementById('calc-bottom-1').value = formatTime(t1);
      document.getElementById('calc-bottom-2').value = formatTime(t2);
      document.getElementById('calc-bottom-3').value = formatTime(t3);
      document.getElementById('calc-bottom-4').value = formatTime(t4);
      document.getElementById('calc-bottom-5').value = formatTime(t5);
      document.getElementById('calc-bottom-6').value = formatTime(t6);
      document.getElementById('calc-bottom-7').value = formatTime(t7);
    }

    ['base-time', 'duration-start', 'duration-hike', 'duration-move', 'duration-stop1', 'duration-meal', 'duration-skywalk', 'duration-home'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updateExpectedTimes);
    });

    ['total-people', 'extra-people', 'gimbap-price'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updateGimbapTotals);
    });

    updateExpectedTimes();
    updateGimbapTotals();
    async function capturePlan() {
      const target = document.getElementById('capture-area');
      const button = document.getElementById('capture-button');
      if (!target || !button) return;

      const originalText = button.textContent;
      button.textContent = '[저장중]';

      try {
        const canvas = await html2canvas(target, {
          backgroundColor: '#ffffff',
          scale: Math.max(window.devicePixelRatio || 1, 2),
          useCORS: true
        });
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = '정기산행_계획.png';
        link.click();
      } catch (error) {
        alert('캡쳐 저장 중 오류가 발생했습니다.');
        console.error(error);
      } finally {
        button.textContent = originalText;
      }
    }

    const captureButton = document.getElementById('capture-button');
    if (captureButton) captureButton.addEventListener('click', capturePlan);

  </script>

    function applyFormData(values) {

      try {
        localStorage.setItem(LOCAL_DRAFT_KEY, JSON.stringify(values));
        localStorage.setItem(LOCAL_DRAFT_TIME_KEY, String(Date.now()));
      } catch (error) {
        console.warn('local draft save skipped:', error);
      }
    }

    function loadLocalDraft() {
      try {
        const raw = localStorage.getItem(LOCAL_DRAFT_KEY);
        if (!raw) return null;
        const values = JSON.parse(raw);
        if (!values || typeof values !== 'object') return null;
        return {
          values,
          updatedAtMs: Number(localStorage.getItem(LOCAL_DRAFT_TIME_KEY) || 0)
        };
      } catch (error) {
        console.warn('local draft load failed:', error);
        return null;
      }
    }

    function persistLocalSnapshot() {
      saveLocalDraft(collectFormData());
    }

    function getEditableFields() {
      return Array.from(document.querySelectorAll('.plan input, .plan textarea')).filter((el) => !el.readOnly && !el.disabled);
    }

    function focusNextEmptyField(currentEl) {
      const fields = getEditableFields();
      const currentIndex = fields.indexOf(currentEl);
      if (currentIndex === -1) return;

      const after = fields.slice(currentIndex + 1);
      const before = fields.slice(0, currentIndex + 1);
      const emptyField = after.find((el) => !String(el.value || '').trim()) || before.find((el) => !String(el.value || '').trim());
      const target = emptyField || after[0] || before[0];
      if (!target || target === currentEl) return;
      target.focus();
      if (typeof target.select === 'function') target.select();
    }

    async function savePlanAuto() {
      if (!db) {
        setFirebaseStatus('실시간저장 대기 중: Firebase 또는 Firestore 연결 안됨');
        return;
      }
      if (suppressAutoSave) {
        return;
      }

      const values = collectFormData();
      saveLocalDraft(values);
      const payloadJson = JSON.stringify(values);
      if (payloadJson === lastSavedJson && payloadJson === lastRemoteJson) {
        setFirebaseStatus(remoteListenerStarted ? '실시간 동기화 연결됨' : '실시간저장 대기 중', true);
        return;
      }

      autoSaveInFlight = true;
      setFirebaseStatus('실시간 저장 중...', false);
      try {
        await setDoc(doc(db, 'tripPlans', 'mainPlan'), {
          values,
          updatedAt: serverTimestamp(),
          updatedBy: clientId,
          pageTitle: document.title,
          saveMode: 'realtime'
        }, { merge: true });
        lastSavedJson = payloadJson;
        setFirebaseStatus('실시간 저장 완료', true);
      } catch (error) {
        console.error('savePlanAuto error:', error);
        setFirebaseStatus('실시간 저장 실패: Firestore 규칙 또는 설정 확인 필요');
      } finally {
        autoSaveInFlight = false;
        if (autoSavePending) {
          autoSavePending = false;
          queueAutoSave(250);
        }
      }
    }

    function queueAutoSave(delay = 350) {
      if (suppressAutoSave) return;
      persistLocalSnapshot();
      if (autoSaveInFlight) {
        autoSavePending = true;
        return;
      }
      window.clearTimeout(autoSaveTimer);
      setFirebaseStatus('입력됨 · 실시간 저장 대기 중...', false);
      autoSaveTimer = window.setTimeout(savePlanAuto, delay);
    }

    function startRealtimeSync() {
      if (!db) {
        setFirebaseStatus('실시간 동기화 실패: Firebase 또는 Firestore 연결 안됨');
        return;
      }

      onSnapshot(doc(db, 'tripPlans', 'mainPlan'), (snap) => {
        remoteListenerStarted = true;
        const localDraft = loadLocalDraft();
        if (!snap.exists()) {
          if (localDraft && localDraft.values) {
            suppressAutoSave = true;
            applyFormData(localDraft.values);
            suppressAutoSave = false;
            lastSavedJson = JSON.stringify(collectFormData());
            lastRemoteJson = lastSavedJson;
            setFirebaseStatus('기기 임시저장 내용 복구됨 · 서버 저장 대기 중', true);
            queueAutoSave(50);
            return;
          }
          lastSavedJson = JSON.stringify(collectFormData());
          lastRemoteJson = lastSavedJson;
          setFirebaseStatus('저장된 내용 없음 · 실시간 동기화 사용 중', true);
          return;
        }

        const data = snap.data() || {};
        const values = data.values || {};
        const incomingJson = JSON.stringify(values);
        const currentJson = JSON.stringify(collectFormData());
        const remoteUpdatedAtMs = data.updatedAt && typeof data.updatedAt.toMillis === 'function' ? data.updatedAt.toMillis() : 0;

        lastRemoteJson = incomingJson;
        lastLoadedAt = new Date();

        let valuesToApply = values;
        let useLocalDraft = false;
        if (localDraft && localDraft.values) {
          const localJson = JSON.stringify(localDraft.values);
          if (localJson !== incomingJson && localDraft.updatedAtMs > remoteUpdatedAtMs) {
            valuesToApply = localDraft.values;
            useLocalDraft = true;
            lastRemoteJson = localJson;
          }
        }

        const targetJson = JSON.stringify(valuesToApply);
        if (targetJson !== currentJson) {
          suppressAutoSave = true;
          applyFormData(valuesToApply);
          suppressAutoSave = false;
        }

        lastSavedJson = JSON.stringify(collectFormData());
        saveLocalDraft(collectFormData());

        if (useLocalDraft) {
          setFirebaseStatus('기기 임시저장 내용 복구됨 · 서버와 다시 동기화 중', true);
          queueAutoSave(50);
        } else if (data.updatedBy && data.updatedBy !== clientId) {
          setFirebaseStatus('다른 기기 변경 내용 실시간 반영됨', true);
        } else {
          setFirebaseStatus('실시간 동기화 연결됨', true);
        }
      }, (error) => {
        console.error('startRealtimeSync error:', error);
        setFirebaseStatus('실시간 동기화 실패: Firestore 규칙 또는 설정 확인 필요');
      });
    }


    function flushBeforeLeave() {
      persistLocalSnapshot();
      window.clearTimeout(autoSaveTimer);
      queueAutoSave(0);
    }

    function bindLifecycleSave() {
      window.addEventListener('pagehide', flushBeforeLeave);
      window.addEventListener('beforeunload', flushBeforeLeave);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          flushBeforeLeave();
        }
      });
    }

    function bindAutoSaveEvents() {
      getEditableFields().forEach((el) => {
        el.addEventListener('input', () => queueAutoSave(350));
        el.addEventListener('change', () => queueAutoSave(150));
        el.addEventListener('blur', () => queueAutoSave(100));
        el.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
            event.preventDefault();
            focusNextEmptyField(el);
          }
        });
      });
    }

    if (hasRealFirebaseConfig(firebaseConfig)) {
      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        setFirebaseStatus(`Firebase 연결 완료: ${firebaseConfig.projectId}`, true);

        try {
          const supported = await analyticsSupported();
          if (supported && firebaseConfig.measurementId) {
            getAnalytics(app);
          }
        } catch (analyticsError) {
          console.warn('Analytics 초기화 건너뜀', analyticsError);
        }

        bindAutoSaveEvents();
        bindLifecycleSave();
        const bootLocalDraft = loadLocalDraft();
        if (bootLocalDraft && bootLocalDraft.values) {
          suppressAutoSave = true;
          applyFormData(bootLocalDraft.values);
          suppressAutoSave = false;
          lastSavedJson = JSON.stringify(collectFormData());
          setFirebaseStatus('기기 임시저장 불러오는 중...', true);
        }
        startRealtimeSync();
      } catch (error) {
        console.error('firebase init error:', error);
        setFirebaseStatus('Firebase 초기화 오류: 등록 코드 또는 Firestore 설정 확인');
      }
    } else {
      setFirebaseStatus('Firebase 등록 코드가 비어 있습니다.');
    }
  </script>

</body>
