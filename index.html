<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정기산행 계획</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 10px;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #ffffff;
      color: #111;
    }
    .sheet {
      width: 1045px;
      margin: 0 auto;
    }
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 4px 2px;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      color: #1737c9;
      margin: 0;
      letter-spacing: -0.3px;
    }
    .capture-btn {
      border: 1px solid #1737c9;
      background: #1737c9;
      color: #fff;
      border-radius: 6px;
      padding: 4px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.2;
      white-space: nowrap;
    }
    .capture-btn:hover {
      filter: brightness(1.05);
    }
    .capture-btn:active {
      transform: translateY(1px);
    }
    .title,
    .capture-btn {
      flex-shrink: 0;
    }
    table.plan {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 2px solid #222;
      font-size: 13px;
      background: #ececec;
    }
    .plan td, .plan th {
      border: 1px dotted #444;
      padding: 3px 4px;
      text-align: center;
      vertical-align: middle;
      height: 30px;
      word-break: keep-all;
      background: #ececec;
      line-height: 1.15;
    }
    .fixed {
      background: #ececec;
      font-weight: 400;
    }
    .input-cell {
      background: #ffffff !important;
      padding: 0;
    }
    .cell-input {
      width: 100%;
      height: 100%;
      min-height: 28px;
      border: 0;
      outline: none;
      background: #ffffff;
      text-align: center;
      font: inherit;
      color: inherit;
      padding: 3px 4px;
      line-height: 1.15;
    }
    .cell-input.left, .left { text-align: left; }
    .cell-input.right, .right { text-align: right; }
    .cell-input.bold, .bold { font-weight: 700; }
    .cell-input.red, .red { color: #c51616; font-weight: 700; }
    .cell-input.blue, .blue { color: #203fd8; font-weight: 700; }
    textarea.cell-input {
      resize: none;
      min-height: 30px;
      line-height: 1.2;
    }
    .meal-row .cell-input {
      min-height: 24px;
    }
    .gray { color: #111; }
    .amount { font-size: 14px; font-weight: 700; }
    .h14 td { height: 14px; }
    .h16 td { height: 16px; }
    .h18 td { height: 18px; }
    .h20 td { height: 20px; }
    .h22 td { height: 22px; }
    .h26 td { height: 26px; }
    .h30 td { height: 30px; }
    .h38 td { height: 38px; }
    .h50 td { height: 50px; }
    .h58 td { height: 58px; }
    .h62 td { height: 62px; }
    .spaced { letter-spacing: 0.15em; }
    .expected-top td:not(:first-child) { border-bottom: 0; }
    .expected-bottom td { border-top: 0; }
    .sky-cell { background: #eaf6ff !important; }
    .sky-cell .cell-input { background: #eaf6ff !important; }
    .readonly-cell .cell-input {
      background: #ffffff;
      pointer-events: none;
      user-select: none;
      font-weight: 400;
    }
    .expected-top .cell-input.bold {
      font-weight: 700 !important;
    }
    #calc-bottom-7 {
      font-weight: 700 !important;
    }
    .calc-cell {
      background: #eaf6ff !important;
    }
    .calc-cell .cell-input {
      background: #eaf6ff !important;
      pointer-events: none;
      user-select: none;
    }
    @media (max-width: 1100px) {
      body { padding: 6px; }
      .sheet { width: 100%; overflow-x: auto; }
      table.plan { min-width: 1045px; }
    }
    @media (max-width: 768px) {
      body { padding: 8px; }
      .title-bar {
        gap: 8px;
        margin: 0 0 6px 0;
        padding: 0 2px;
        align-items: center;
      }
      .title {
        font-size: 17px;
        line-height: 1.2;
      }
      .capture-btn {
        min-height: 34px;
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 8px;
      }
    }
    @media (max-width: 430px) {
      .title-bar {
        gap: 6px;
      }
      .title {
        font-size: 16px;
        letter-spacing: -0.4px;
      }
      .capture-btn {
        min-height: 36px;
        padding: 7px 12px;
        font-size: 13px;
      }
    }
  
    .firebase-panel {
      margin: 10px 0 14px;
      padding: 10px 12px;
      border: 1px solid #cfd8ff;
      background: #f6f8ff;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.45;
      color: #1d2a57;
    }
    .firebase-title {
      font-weight: 700;
      margin-bottom: 4px;
      color: #1737c9;
    }
    .firebase-status {
      margin-top: 6px;
      font-weight: 700;
      color: #1737c9;
      word-break: break-word;
    }

  </style>
</head>

  <script>
    function parseDuration(text) {
      const raw = String(text || '').replace(/예정/g, '').trim();
      const match = raw.match(/(\d{1,2})\s*:\s*(\d{2})/);
      if (!match) return 0;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function parseTime(text) {
      const raw = String(text || '').trim();
      const match = raw.match(/(\d{1,2})\s*:\s*(\d{2})/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function formatTime(totalMinutes) {
      const minutesInDay = 24 * 60;
      let value = totalMinutes % minutesInDay;
      if (value < 0) value += minutesInDay;
      const h = Math.floor(value / 60);
      const m = value % 60;
      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function parseNumber(text) {
      const raw = String(text || '').replace(/[^\d.-]/g, '');
      const value = Number(raw);
      return Number.isFinite(value) ? value : 0;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function updateGimbapTotals() {
      const totalPeopleEl = document.getElementById('total-people');
      const extraPeopleEl = document.getElementById('extra-people');
      const unitPriceEl = document.getElementById('gimbap-price');
      const countEl = document.getElementById('gimbap-count');
      const totalEl = document.getElementById('gimbap-total');
      const mealCountEl = document.getElementById('meal-count');
      if (!totalPeopleEl || !extraPeopleEl || !unitPriceEl || !countEl || !totalEl) return;

      const totalPeople = parseNumber(totalPeopleEl.value);
      const extraPeople = parseNumber(extraPeopleEl.value);
      const unitPrice = parseNumber(unitPriceEl.value);
      const mealCount = totalPeople + extraPeople;
      const orderCount = totalPeople + extraPeople;
      const totalPrice = orderCount * unitPrice;

      if (mealCountEl) mealCountEl.value = formatNumber(mealCount) + ' 명';
      countEl.value = formatNumber(orderCount) + ' 줄';
      totalEl.value = formatNumber(totalPrice) + ' 원';
    }

    function updateExpectedTimes() {
      const baseEl = document.getElementById('base-time');
      if (!baseEl) return;
      const base = parseTime(baseEl.value);
      if (base === null) return;

      const d1 = parseDuration(document.getElementById('duration-start').value);
      const d2 = parseDuration(document.getElementById('duration-hike').value);
      const d3 = parseDuration(document.getElementById('duration-move').value);
      const d4 = parseDuration(document.getElementById('duration-stop1').value);
      const d5 = parseDuration(document.getElementById('duration-meal').value);
      const d6 = parseDuration(document.getElementById('duration-skywalk').value);
      const d7 = parseDuration(document.getElementById('duration-home').value);

      const t1 = base + d1;
      const t2 = t1 + d2;
      const t3 = t2 + d3;
      const t4 = t3 + d4;
      const t5 = t4 + d5;
      const t6 = t5 + d6;
      const t7 = t6 + d7;

      document.getElementById('calc-top-1').value = formatTime(t1) + ' ->';
      document.getElementById('calc-top-2').value = formatTime(t2) + ' ->';
      document.getElementById('calc-top-3').value = formatTime(t3) + ' ->';
      document.getElementById('calc-top-4').value = formatTime(t4) + ' ->';
      document.getElementById('calc-top-5').value = formatTime(t5) + ' ->';
      document.getElementById('calc-top-6').value = formatTime(t6) + ' ->';

      document.getElementById('calc-bottom-1').value = formatTime(t1);
      document.getElementById('calc-bottom-2').value = formatTime(t2);
      document.getElementById('calc-bottom-3').value = formatTime(t3);
      document.getElementById('calc-bottom-4').value = formatTime(t4);
      document.getElementById('calc-bottom-5').value = formatTime(t5);
      document.getElementById('calc-bottom-6').value = formatTime(t6);
      document.getElementById('calc-bottom-7').value = formatTime(t7);
    }

    ['base-time', 'duration-start', 'duration-hike', 'duration-move', 'duration-stop1', 'duration-meal', 'duration-skywalk', 'duration-home'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updateExpectedTimes);
    });

    ['total-people', 'extra-people', 'gimbap-price'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updateGimbapTotals);
    });

    updateExpectedTimes();
    updateGimbapTotals();
    async function capturePlan() {
      const target = document.getElementById('capture-area');
      const button = document.getElementById('capture-button');
      if (!target || !button) return;

      const originalText = button.textContent;
      button.textContent = '[저장중]';

      try {
        const canvas = await html2canvas(target, {
          backgroundColor: '#ffffff',
          scale: Math.max(window.devicePixelRatio || 1, 2),
          useCORS: true
        });
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = '정기산행_계획.png';
        link.click();
      } catch (error) {
        alert('캡쳐 저장 중 오류가 발생했습니다.');
        console.error(error);
      } finally {
        button.textContent = originalText;
      }
    }

    const captureButton = document.getElementById('capture-button');
    if (captureButton) captureButton.addEventListener('click', capturePlan);

  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    function hasRealFirebaseConfig(config) {
